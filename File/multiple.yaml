port: 7890
allow-lan: false
mode: rule
log-level: info
unified-delay: true
tcp-concurrent: true
global-client-fingerprint: chrome
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: true
  prefer-h3: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  use-hosts: true
  nameserver:
    - 114.114.114.114
    - 223.5.5.5
    
  fake-ip-filter:
    - '*.lan'
    - '*.localdomain'
    - '*.localhost'
    - '*.local'
    #
    - "connect.rom.miui.com"
    - "+.miwifi.com"
    - "+.ntp.org"
    - "+.u-tools.cn"
    - "+.mediatek.com"
    - "+.cfprefer1.xyz"
    - "+.wetab.link"
    - "+.tyasaka.xyz"
    # QQ
    - "localhost.ptlogin2.qq.com"
    - "localhost.sec.qq.com"
    # WeChat
    - "localhost.work.weixin.qq.com"
    - "+.weixin.qq.com"
    - "+.wechat.com"
    # Windows
    - "time.windows.com"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "+.wpsmail.net"
    - "+.henzanapp.com"
    - "+.pconline.com.cn"
    
    
    
proxy-providers:
  # 名称可改        
#============================================================================= 
  Go:
    type: http  
    url:  https://cdn.jsdelivr.net/gh/xiagd/Work@main/File/go.yaml
    path: ./Go.yaml
    #更新间隔单位是秒
    interval: 3600 # 1小时更新
    #是否用代理更新
    proxy: DIRECT
    # 节点名称前缀 p1
    override: 
      additional-prefix: "GO |"
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 1800  #30分钟
      timeout: 3000  #xxx ms
      lazy: false #true 

  Fan:
    type: http 
    url:  https://cdn.jsdelivr.net/gh/xiagd/Work@main/File/fan.yaml
    path: ./Fan.yaml
    #更新间隔单位是秒
    interval: 3600 # 1小时更新
    #是否用代理更新
    proxy: DIRECT
    # 节点名称前缀 p1
    override: 
      additional-prefix: "FV |"
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 1800  #30分钟
      timeout: 3000  #xxx ms
      lazy: false #true

  FanA:
    type: http 
    url:  https://cdn.jsdelivr.net/gh/xiagd/Work@main/File/fana.yaml
    path: ./FanA.yaml
    #更新间隔单位是秒
    interval: 3600 # 1小时更新
    #是否用代理更新
    proxy: DIRECT
    # 节点名称前缀 p1
    override: 
      additional-prefix: "FA |"
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 1800  #30分钟
      timeout: 3000  #xxx ms
      lazy: false #true      


proxy-groups:
- name: 节点选择
  type: select
  proxies:
  - 自动选择
  - 自动选择_Go
  - 自动选择_Fan
  - 自动回退
  - 自动回退_Go
  - 自动回退_Fan
  - 手动选择
  - 手动选择_Go
  - 手动选择_Fan
  - 负载均衡
  - 负载均衡_Go
  - 负载均衡_Fan
  - DIRECT
 

 #=======================================
- name: 自动选择
  type: url-test 
  url: http://www.gstatic.com/generate_204
  interval: 300   #秒
  tolerance: 100    #控制切换灵敏度ms
  timeout:  2000 
  lazy: true 
  health-check:
     enable: true
     url: http://www.gstatic.com/generate_204
     interval: 120          # x秒检查高优先级组是否恢复
     tolerance: 100
     timeout:  2000   # 超时x秒视为不可用
     #expected-status: 204
     max-failed-times: 3             # 连续失败3次标记节点不可用
     lazy: true             # true :检测当前被策略组使用的节点,  false:检测所有节点
  proxies:
    #- 自动选择_Go
    #- 自动选择_FanVPN
  #- ss1自建节点
  #- vm+ws自建节点
  use:
    - Go
    - Fan
    - FanA
  
