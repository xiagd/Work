name: Run Python Scripts Daily

on:
  schedule:
    - cron: '0 */8 * * *'   # 每8小时一次， 0:00, 8:00, 16:00（UTC 时间）
  workflow_dispatch:   # 允许手动点击按钮触发（用于测试）

jobs:
  run-scripts:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 添加这一行
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 如果没有 requirements.txt，也可以直接在这里写 pip install requests PyYAML pycryptodome
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
      - name: Run go.py
        run: python go.py

      - name: Run fan.py
        run: python fan.py

      - name: Run fana.py
        run: python fana.py   
        
      - name: Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add File/fan.yaml File/go.yaml File/fana.yaml
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update configs" && git push)
