 #=======================================
- name: 负载均衡
  type: load-balance             # 必须指定类型
  url: https://www.gstatic.com/generate_204  # 节点测试地址
  interval: 300                  # 节点延迟测试间隔（单位：秒）
  #strategy: round-robin          # 负载策略（轮询）
  strategy: consistent-hashing      # 负载策略（一致性哈希，相同目标IP/域名固定使用同一节点）
  timeout:  2000   #xxx ms
  tolerance: 100
  max-failed-times: 3             # 连续失败3次标记节点不可用
  health-check:
     enable: true
     url: http://www.gstatic.com/generate_204
     interval: 180          # *s检查高优先级组是否恢复
     tolerance: 100
     timeout:  2000   # 超时2秒视为不可用
     max-failed-times: 3             # 连续失败3次标记节点不可用
     lazy: true             # true :检测当前被策略组使用的节点,  false:检测所有节点
  proxies:
  #- ss1自建节点
  #- vm+ws自建节点
  use:
    - Go
    - Fan
    - FanA
    
    
